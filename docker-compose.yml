services:
  db:
    image: postgres:15-alpine
    container_name: catdock_db
    restart: always
    environment:
      POSTGRES_USER: catdock_user
      POSTGRES_PASSWORD: catdock_secure_password_123
      POSTGRES_DB: catdock_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: catdock_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
